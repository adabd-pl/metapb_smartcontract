<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Graph Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-dag@0.6"></script>
    <style>
        .node.A { fill: red; }
        .node.G { fill: green; }
        .node.U { fill: blue; }
        .link { stroke: black; stroke-width: 1.5px; fill: none; }
        .text { font-size: 12px; text-anchor: middle; }
        .link-label { font-size: 10px; fill: black; text-anchor: middle; }
    </style>
</head>
<body>
    <svg width="800" height="600"></svg>

    <script>
        // Funkcja do pobrania danych z pliku JSON
        async function loadGraphData() {
            try {
                const response = await fetch('graphData.json'); // Wczytaj plik JSON
                const data = await response.json(); // Parsowanie JSON
                visualizeGraph(data); // Przekaż dane do funkcji wizualizacji
            } catch (error) {
                console.error('Błąd podczas wczytywania pliku JSON:', error);
            }
        }

        // Funkcja do wizualizacji grafu
        function visualizeGraph(graphData) {
            // Wyciąganie wierzchołków i krawędzi
            const nodes = graphData.map(d => ({ id: d.vertex }));
            const links = graphData.flatMap(d =>
                d.direct_children_index_table.map(child => ({
                    source: d.vertex,
                    target: child.vertex,
                    permissions: child.permissions
                }))
            );

            // Tworzenie układu DAG (Directed Acyclic Graph)
            const dag = d3.dagStratify()(nodes.map(d => ({
                id: d.id,
                parentIds: links.filter(link => link.target === d.id).map(link => link.source)
            })));

            const layout = d3.sugiyama()
                .size([800, 600])
                .layering(d3.layeringSimplex())
                .decross(d3.decrossTwoLayer())
                .coord(d3.coordCenter())
                (dag);

            // Tworzenie SVG
            const svg = d3.select("svg");
            const linkGroup = svg.append("g");
            const nodeGroup = svg.append("g");

            // Dodanie krawędzi
            const linkElements = linkGroup.selectAll("path")
                .data(dag.links())
                .join("path")
                .attr("class", "link")
                .attr("d", d => d3.line()(
                    d.points.map(p => [p.x, p.y])
                ));

            // Dodanie etykiet krawędzi (permissions)
            linkGroup.selectAll("text")
                .data(dag.links())
                .join("text")
                .attr("class", "link-label")
                .attr("x", d => {
                    const midPoint = d.points.reduce((acc, p, i, arr) => {
                        if (i < arr.length - 1) {
                            acc.x += (p.x + arr[i + 1].x) / 2;
                        }
                        return acc;
                    }, { x: 0 }).x / (d.points.length - 1);
                    return midPoint;
                })
                .attr("y", d => {
                    const midPoint = d.points.reduce((acc, p, i, arr) => {
                        if (i < arr.length - 1) {
                            acc.y += (p.y + arr[i + 1].y) / 2;
                        }
                        return acc;
                    }, { y: 0 }).y / (d.points.length - 1);
                    return midPoint;
                })
                .text(d => {
                    const link = links.find(l => l.source === d.source.id && l.target === d.target.id);
                    return link ? link.permissions : "";
                });

            // Dodanie wierzchołków
            const nodeElements = nodeGroup.selectAll("circle")
                .data(dag.descendants())
                .join("circle")
                .attr("class", d => `node ${d.id.startsWith('A') ? 'A' : d.id.startsWith('G') ? 'G' : 'U'}`)
                .attr("r", 10)
                .attr("cx", d => d.x)
                .attr("cy", d => d.y);

            // Dodanie etykiet wierzchołków
            nodeGroup.selectAll("text")
                .data(dag.descendants())
                .join("text")
                .attr("class", "text")
                .attr("x", d => d.x)
                .attr("y", d => d.y - 15) // Pozycjonowanie etykiety nad wierzchołkiem
                .text(d => d.id);
        }

        // Wywołanie funkcji ładującej dane
        loadGraphData();
    </script>
</body>
</html>
